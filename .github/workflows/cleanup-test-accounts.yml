name: Nightly Test Account Cleanup

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - name: Run cleanup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/cleanup-test-accounts.ts
        # DATABASE_URL comes from repo secrets, so no --env-file needed in CI.
